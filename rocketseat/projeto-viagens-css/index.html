<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <title>Projeto Viagens | Css</title>
  </head>
  <body>
    <!--PAGE-->
    <div id="page">
      <!--NAV-->
      <nav id="nav-main">
        <!--LOGO-->
        <a href="#" class="nav-main_logo-link">
          <img src="images/icons/Logo.svg" alt="Logo da empresa Travelgram" />
        </a>
        <!--Navegation List-->
        <div class="nav-main_div-nav">
          <ul class="list-nav">
            <!--Lupa-->
            <li class="list-nav_item">
              <a href="#">
                <img
                  src="./images/icons/MagnifyingGlass.svg"
                  alt="imagem de uma pequena lupa transparente."
                />
              </a>
            </li>
            <!--Explorar-->
            <li class="list-nav_item">
              <a href="#"> explorar </a>
            </li>
            <!--Minhas viagens-->
            <li class="list-nav_item">
              <a href="#"> minhas viagens </a>
            </li>
            <!--Imagem de perfil pequena-->
            <li class="list-nav_item">
              <a href="#">
                <img
                  src="images/icons/Profile pic.png"
                  alt="imagem de perfil pequena com uma mulher sorrindo"
                />
              </a>
            </li>
          </ul>
        </div>
      </nav>
      <!--FIM DO NAV-->
      <!--HEADER-->
      <header id="header-main">
        <!--About Section-->
        <section class="about_section">
          <!--ABOUT DIV-->
          <div class="div-about">
            <img
            src="./images/icons/Profile pic.png"
            alt="imagem de perfil com uma mulher sorrindo"/>
            <div class="box-about">
              <h1 class="main-title">Isabela Torres</h1>
              <p class="about-paragraph">
                Amante de viagens, cultura e gastronomia. 🌍✈️ Aqui compartilho as
                histórias registradas em cada clique, explorando cantinhos
                fascinantes do nosso planeta a partir da movimentada cidade de São
                Paulo. 🏙️📸
              </p>
            </div>
          </div>
          <!--INFO DIV-->
          <div class="div-info">
            <ul class="list-info">
              <!--Pin image-->
              <li class="list-info_item">
                <img src="images/icons/MapPin.svg" alt="Icone com a imagem de um pequeno Pino com a cor laranja.">
                <p>são paulo</p>
              </li>

              <!--Airplane-->
              <li class="list-info_item">
                <img src="images/icons/AirplaneTilt.svg" alt="Icone com a imagem de um aviao a cor laranja.">
                <p>37 paises</p>
              </li>

              <!--Image-->
              <li class="list-info_item">
                <img src="images/icons/Image.svg" alt="Icone com uma imagem de uma pequena paisagem.">
                <p>240 fotos</p>
              </li>

            </ul>

          </div>
        </section>
        <!--Fim da section About-->
      </header>
      <!--Fim do header-->
    </div>
  </body>
</html>
